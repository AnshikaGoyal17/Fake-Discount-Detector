name: Daily Price Scraper

on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python scraper.py

      - name: Show generated files
        run: |
          ls -la
          if [ -f price_history.csv ]; then
            echo "price_history.csv exists"
            wc -l price_history.csv
          else
            echo "price_history.csv not found"
          fi

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add price_history.csv products.csv asin_history.json seen_asins.json
          git status
          git diff --cached --quiet || git commit -m "Auto: daily price scrape $(date '+%Y-%m-%d %H:%M:%S')"
          git push
