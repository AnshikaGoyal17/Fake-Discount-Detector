# Project : DealOrDud — Fake Discount Detector
# Purpose : Run the scraper automatically every day on GitHub's FREE cloud
#           servers
# ═════════════════════════════════════════════════════════════════════════════
name: Daily Price Scraper

on:

  schedule:
    - cron: '30 0 * * *'

  workflow_dispatch:

jobs:
  scrape:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4

      - name: Run scraper
        run: |
          python scraper.py --discover-if-missing

      - name: Commit and push updated price data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/amazon_discount_history.csv products.csv
          git diff --staged --quiet || git commit -m "Auto: daily price scrape $(date '+%Y-%m-%d')"
          git push